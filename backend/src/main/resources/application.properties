spring.application.name=backend
server.port=${PORT:8080}
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/ridiculous}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:ridiculous}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:ridiculous}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

telegram.bot.token=${TELEGRAM_BOT_TOKEN}
telegram.bot.web-app-url=${TELEGRAM_WEB_APP_URL:https://ridiculous-movies.onrender.com}
telegram.bot.webhook-url=${TELEGRAM_WEBHOOK_URL:https://ridiculous-movies.onrender.com/api/telegram/webhook}
telegram.bot.webhook-secret=${TELEGRAM_WEBHOOK_SECRET:}
telegram.bot.start-message=${TELEGRAM_START_MESSAGE:Movie Time! Tap the button below to open the app}
telegram.bot.start-button-text=${TELEGRAM_START_BUTTON_TEXT:Start}
telegram.bot.menu-button-text=${TELEGRAM_MENU_BUTTON_TEXT:Open app}
telegram.bot.start-photo-url=${TELEGRAM_START_PHOTO_URL:}
