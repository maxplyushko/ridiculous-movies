# Render Blueprint: repo root = build context.
# In the dashboard, create a Postgres (or use Neon) and set:
#   SPRING_DATASOURCE_URL=jdbc:postgresql://HOST:5432/DBNAME
#   SPRING_DATASOURCE_USERNAME=...
#   SPRING_DATASOURCE_PASSWORD=...
services:
  - type: web
    name: ridiculous-movies
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
