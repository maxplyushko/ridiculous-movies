services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ridiculous
      POSTGRES_USER: ridiculous
      POSTGRES_PASSWORD: ridiculous
    ports:
      - "5432:5432"
    volumes:
      - ridiculous_pg:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ridiculous -d ridiculous" ]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/ridiculous
      SPRING_DATASOURCE_USERNAME: ridiculous
      SPRING_DATASOURCE_PASSWORD: ridiculous
    depends_on:
      db:
        condition: service_healthy

volumes:
  ridiculous_pg:
